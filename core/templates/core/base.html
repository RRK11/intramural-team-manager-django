<!DOCTYPE html>
<html>
<head>
    <title>Intramural Team Manager</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        .navbar {
            background: #0d1b2a;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 15px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .page-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .hero-title {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero-text {
            font-size: 18px;
            color: #555;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 20px;
            background: #0d6efd;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .button:hover {
            background: #0b5ed7;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .metric-box {
            background: #eef3f8;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .metric-number {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #0d1b2a;
        }

        .section-title {
            margin-bottom: 18px;
            font-size: 28px;
        }

        .games-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .games-table th,
        .games-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        .games-table th {
            background: #eef3f8;
        }

        .stat-row {
            margin-bottom: 18px;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .bar-container {
            width: 100%;
            background: #e0e0e0;
            border-radius: 999px;
            overflow: hidden;
            height: 24px;
        }

        .bar-fill {
            height: 24px;
            background: linear-gradient(90deg, #0d6efd, #4dabf7);
            color: white;
            font-size: 12px;
            text-align: right;
            line-height: 24px;
            padding-right: 8px;
            box-sizing: border-box;
            min-width: 40px;
        }

        .footer-note {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">Intramural Team Manager</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about/">About</a>
            <a href="/admin/">Admin</a>
        </div>
    </nav>

    <div class="page-container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
